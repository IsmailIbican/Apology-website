<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love You</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="interactive-area">
            
            <h1>Just You and Me</h1>
            <p class="subtitle">Prensesim, Lütfen o sihirli sözcüğü söyler misin ? </p>
            
            <input type="password" id="password-input" placeholder="Şifre" autocomplete="off">
            <button id="login-btn">ZARFI AÇ</button>
            <p id="error-msg">Bu pek doğru değil sanki, tekrar dener misin?</p>
        </div>
    </div>

    <div id="letter-screen" class="screen hidden">
        <h1 style="color: #d4c4a8; font-family: 'Cinzel', serif;">Mektup Kısmına Hoş Geldin Aşkım</h1>
    </div>

    <script src="script.js"></script>
</body>
</html>
