<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just You and Me</title>
    <link rel="stylesheet" href="mektup.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="transition-screen">
        <h1>Mektup Ekranına Hoş Geldin Aşkım</h1>
    </div>

    <div id="letter-content" class="hidden">
        <div class="letter-container">
            <p id="typewriter-text"></p>
        </div>
        
        <div id="forgive-section" class="hidden">
            <p class="question">Beni affediyor musun?</p>
            <div class="buttons">
                <button id="yes-btn">Evet 🖤</button>
                <button id="no-btn">Hayır</button>
            </div>
        </div>
    </div>

    <div id="final-screen" class="hidden">
        <h1 class="final-text">Biliyordum...<br>Seni çok seviyorum! 🖤</h1>
    </div>

    <script src="mektup.js"></script>
</body>
</html>
